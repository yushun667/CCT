name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-22.04
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-18 llvm-18-dev libclang-18-dev
          echo "LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      - name: Install LLVM 18 (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install 7zip -y
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.0/clang+llvm-18.1.0-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile llvm.tar.xz -UseBasicParsing
          $outDir = $env:GITHUB_WORKSPACE
          7z x llvm.tar.xz "-o$outDir"
          $tarFile = Get-ChildItem -Path $outDir -Filter "*.tar" | Select-Object -First 1
          if ($tarFile) { 7z x $tarFile.FullName "-oC:\" }
          echo "LLVM_PREFIX=C:\clang+llvm-18.1.0-x86_64-pc-windows-msvc" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Remove local cargo config
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Fix icon.ico for Windows RC (3.00 format)
        if: runner.os == 'Windows'
        run: |
          pip install Pillow --quiet
          python -c "
          from PIL import Image
          img = Image.open('src-tauri/icons/32x32.png').convert('RGBA')
          sizes = [(16,16), (32,32), (48,48), (64,64)]
          img.save('src-tauri/icons/icon.ico', format='ICO', sizes=sizes, bitmap_format='bmp')
          "

      - name: Install npm dependencies
        run: npm ci

      - name: Type check frontend
        run: npx vue-tsc --noEmit

      - name: Build frontend
        run: npx vite build

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Build Tauri app
        run: cargo build -p cct-desktop --release
