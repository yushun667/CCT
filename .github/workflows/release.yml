name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macOS-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: macOS-x64
            os: macos-13
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Remove local cargo config
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "CCT ${{ github.ref_name }}"
          releaseBody: |
            ## CCT ${{ github.ref_name }}

            C/C++ 代码架构分析平台发布。

            ### 安装说明
            - **Windows**: 下载 `.msi` 或 `.exe` 安装程序
            - **macOS**: 下载 `.dmg` 文件
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件

            > 注意：当前构建不包含 LLVM/Clang 解析引擎。
            > 需要在本地安装 LLVM 18 并将其放入 `third_party/llvm/` 目录以启用代码解析功能。
          releaseDraft: true
          prerelease: false
