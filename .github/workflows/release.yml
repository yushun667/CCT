name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macOS-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: macOS-x64
            os: macos-14-large
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-18 llvm-18-dev libclang-18-dev
          echo "LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV

      # Windows Release 暂不链接 LLVM（C++ 桥接需 Clang，MSVC 不兼容），产出为仅界面安装包
      # - name: Install LLVM 18 (Windows) ...

      - name: Remove local cargo config
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Fix icon.ico for Windows RC (3.00 format)
        if: runner.os == 'Windows'
        run: |
          pip install Pillow --quiet
          python -c "
          from PIL import Image
          img = Image.open('src-tauri/icons/32x32.png').convert('RGBA')
          sizes = [(16,16), (32,32), (48,48), (64,64)]
          img.save('src-tauri/icons/icon.ico', format='ICO', sizes=sizes, bitmap_format='bmp')
          "

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "CCT ${{ github.ref_name }}"
          releaseBody: |
            ## CCT ${{ github.ref_name }}

            C/C++ 代码架构分析平台发布。

            ### 安装说明
            - **Windows**: 下载 `.msi` 或 `.exe` 安装程序
            - **macOS**: 下载 `.dmg` 文件
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件

            > 本构建包含 LLVM/Clang 解析引擎，支持本地 C/C++ 源码解析与调用图分析。
          releaseDraft: true
          prerelease: false
